[pytest]
# Indique à pytest de chercher les tests uniquement dans le dossier 'Test_unitaire'
testpaths = Test_unitaire
# Ajoute des options par défaut, comme le mode verbeux (-v)
addopts = -v
# Ajoute le répertoire courant au PYTHONPATH pour trouver les modules (services, repositories, etc.)
pythonpath = .